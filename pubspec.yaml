name: dsmo_app
description: DSMO digital declaration platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2

  # --- Layout & Grid ---
  flutter_layout_grid: ^2.0.5

  # --- State management & networking ---
  flutter_riverpod: ^2.4.0
  dio: ^5.3.0
  http: ^1.1.0

  # --- Routing ---
  go_router: ^14.0.0

  # --- Local storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Utilities ---
  intl: ^0.18.0
  url_launcher: ^6.1.0

  # --- File handling & export ---
  file_picker: ^8.0.0
  excel: ^4.0.0
  path_provider: ^2.1.0
  share_plus: ^10.1.0

  # --- Charts & PDF ---
  fl_chart: ^0.63.0
  pdf: ^3.10.4
  printing: ^5.9.0
  syncfusion_flutter_pdfviewer: ^23.2.7

  # --- UI / Fonts & Animations ---
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  open_file: ^3.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/onefop_logo.png